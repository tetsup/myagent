# Minimal Kubernetes manifests for the myagent stack.
# Build & push the three images first, then substitute ${REGISTRY}.
apiVersion: v1
kind: Namespace
metadata:
  name: myagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: myagent
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports: [{ containerPort: 11434 }]
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: myagent
spec:
  selector: { app: ollama }
  ports: [{ port: 11434, targetPort: 11434 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: myagent
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent }
  template:
    metadata:
      labels: { app: agent }
    spec:
      containers:
        - name: agent
          image: ${REGISTRY}/myagent-agent:latest
          ports: [{ containerPort: 8081 }]
          env:
            - { name: LLM_PROVIDER, value: "ollama" }
            - { name: LLM_BASE_URL, value: "http://ollama:11434" }
            - { name: LLM_MODEL, value: "llama3.1" }
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: myagent
spec:
  selector: { app: agent }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: myagent
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ${REGISTRY}/myagent-api:latest
          ports: [{ containerPort: 3001 }]
          env:
            - { name: AGENT_URL, value: "http://agent:8081" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: myagent
spec:
  selector: { app: api }
  ports: [{ port: 3001, targetPort: 3001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: myagent
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ${REGISTRY}/myagent-web:latest
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: myagent
spec:
  type: LoadBalancer
  selector: { app: web }
  ports: [{ port: 80, targetPort: 80 }]
