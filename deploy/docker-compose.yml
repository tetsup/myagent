# Full local/on-prem stack. The language model runs in-cluster via Ollama;
# point the agent at a cloud OpenAI-compatible endpoint instead by setting
# LLM_PROVIDER=openai, LLM_BASE_URL and LLM_API_KEY.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  agent:
    build:
      context: ..
      dockerfile: services/agent/Dockerfile
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - ollama

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      AGENT_URL: http://agent:8081
    depends_on:
      - agent

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  ollama:
